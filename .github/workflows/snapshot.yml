name: snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute short SHA
        id: meta
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and package (binary + agents/)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          ARCHIVE_BASE="agentctl-${SHORT_SHA}-${GOOS}-${GOARCH}"
          BINARY="agentctl${EXT}"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${SHORT_SHA}" \
            -o "dist/${BINARY}" ./cmd/agentctl
          STAGE="dist/stage-${GOOS}-${GOARCH}/agentctl"
          mkdir -p "$STAGE"
          cp "dist/${BINARY}" "$STAGE/${BINARY}"
          cp -r agents "$STAGE/"
          rm "dist/${BINARY}"
          if [ "$GOOS" = "windows" ]; then
            (cd "dist/stage-${GOOS}-${GOARCH}" && zip -r "../${ARCHIVE_BASE}.zip" agentctl)
          else
            (cd "dist/stage-${GOOS}-${GOARCH}" && tar -czf "../${ARCHIVE_BASE}.tar.gz" agentctl)
          fi
          rm -rf "dist/stage-${GOOS}-${GOARCH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentctl-${{ steps.meta.outputs.short_sha }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/agentctl-*
          retention-days: 14
