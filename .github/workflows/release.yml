name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package (binary + agents/)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          BINARY="agentctl-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/${BINARY}" ./cmd/agentctl
          STAGE="dist/stage-${GOOS}-${GOARCH}/agentctl"
          mkdir -p "$STAGE"
          cp "dist/${BINARY}" "$STAGE/agentctl${EXT}"
          cp -r agents "$STAGE/"
          rm "dist/${BINARY}"
          if [ "$GOOS" = "windows" ]; then
            (cd "dist/stage-${GOOS}-${GOARCH}" && zip -r "../agentctl-${GOOS}-${GOARCH}.zip" agentctl)
          else
            (cd "dist/stage-${GOOS}-${GOARCH}" && tar -czf "../agentctl-${GOOS}-${GOARCH}.tar.gz" agentctl)
          fi
          rm -rf "dist/stage-${GOOS}-${GOARCH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/agentctl-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
